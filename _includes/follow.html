<section class="follow">
  <h4>Follow me</h4>
  {% if site.facebook %}
    <a onClick="ga('send', 'event', 'Social Follow', 'Follow on Facebook');" class="facebook_follow" title="Follow on Facebook" href="http://www.facebook.com/{{ site.facebook }}" target="_blank"><i class="fa fa-lg fa-facebook-square"></i></a>
  {% endif %}
  {% if site.twitter %}
    <a onClick="ga('send', 'event', 'Social Follow', 'Follow on Twitter');" class="twitter_follow" title="Follow on Twitter" href="https://twitter.com/{{ site.twitter }}" target="_blank"><i class="fa fa-lg fa-twitter-square"></i></a>
  {% endif %}
  {% if site.linkedin %}
    <a onClick="ga('send', 'event', 'Social Follow', 'Follow on LinkedIn');" class="linkedin_follow" title="Follow on LinkedIn" href="http://www.linkedin.com/in/{{ site.linkedin }}" target="_blank"><i class="fa fa-lg fa-linkedin-square"></i></a>
  {% endif %}
  {% if site.googleplus %}
    <a onClick="ga('send', 'event', 'Social Follow', 'Follow on Google+');" class="googleplus_follow" title="Follow on LinkedIn" href="https://plus.google.com/u/0/+{{ site.googleplus }}" target="_blank"><i class="fa fa-lg fa-google-plus-square"></i></a>
  {% endif %}
  {% if site.stackoverflow %}
    <a onClick="ga('send', 'event', 'Social Follow', 'Follow on StackOverflow');" class="stackoverflow_follow" title="Follow on StackOverflow" href="https://stackoverflow.com/users/{{ site.stackoverflow }}" target="_blank"><i class="fa fa-lg fa-stack-exchange"></i></a>
  {% endif %}
  {% if site.github %}
    <a onClick="ga('send', 'event', 'Social Follow', 'Follow on GitHub');" class="github_follow" title="Follow on GitHub" href="https://github.com/{{ site.github }}" target="_blank"><i class="fa fa-lg fa-github-square"></i></a>
  {% endif %}
</section>
